<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Translator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            resize: none;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .output {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            min-height: 50px;
        }

        .label {
            font-weight: bold;
            margin-top: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌍 AI Translator</h2>

    <form method="POST">
        <div class="label">Enter Text</div>
        <textarea name="text" placeholder="Type something..."></textarea>

        <div class="label">Translate To</div>
        <select name="language">
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
        </select>

        <button type="submit">Translate</button>
    </form>

    <div class="output">
        {{ translated_text }}
    </div>
    <p><small>Detected language: {{ detected_lang }}</small></p>
</div>

</body>
<script>
    const form = document.querySelector("form");
    const button = document.querySelector("button");

    form.addEventListener("submit", () => {
        button.innerText = "Translating...";
        button.disabled = true;
    });
</script>
</html>
